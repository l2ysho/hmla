<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 22px 28px; background: var(--surface-panel); }
  .row { display: flex; align-items: baseline; gap: 16px; padding: 5px 0; border-bottom: 1px solid var(--line-soft); }
  .row:last-child { border-bottom: 0; }
  .tag { font-family: var(--font-mono); font-size: 11px; color: var(--text-faint); width: 96px; flex: none; letter-spacing: .04em; }
  .spec { font-family: var(--font-display); color: var(--text-body); line-height: 1.1; white-space: nowrap; }
</style>
</head>
<body>
  <div class="row"><span class="tag">display · 88</span><span class="spec" style="font-size:40px">hmla</span></div>
  <div class="row"><span class="tag">h2 · 44</span><span class="spec" style="font-size:30px">generative</span></div>
  <div class="row"><span class="tag">h4 · 24</span><span class="spec" style="font-size:22px">route to bus</span></div>
  <div class="row"><span class="tag">body · 15</span><span class="spec" style="font-size:15px;font-family:var(--font-mono)">shape the noise, then let it run</span></div>
  <div class="row"><span class="tag">label · 12</span><span class="spec" style="font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--text-label)">density</span></div>
  <div class="row"><span class="tag">micro · 11</span><span class="spec" style="font-size:11px;font-family:var(--font-mono);color:var(--text-faint)">RMS −18 dBFS · seed 0x4F2A</span></div>
</body>
</html>
