<!-- @dsCard group="Type" viewport="700x190" name="Display — Martian Mono" subtitle="Headings & hero numerals · tight tracking" -->
<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 26px 28px; background: var(--surface-panel); }
  .row { display: flex; align-items: baseline; gap: 18px; flex-wrap: wrap; }
  .num { font-family: var(--font-display); font-weight: var(--fw-medium); letter-spacing: var(--ls-display); color: var(--text-hi); line-height: 1; }
  .big { font-size: 88px; }
  .h2 { font-size: 44px; }
  .h4 { font-size: 24px; color: var(--text-body); }
  .meta { font-family: var(--font-display); font-size: 11px; letter-spacing: .14em; text-transform: uppercase; color: var(--text-label); margin-top: 14px; }
  .accent { color: var(--accent); }
</style>
</head>
<body>
  <div class="row">
    <span class="num big hmla-tnum">120.00<span class="accent">.</span></span>
    <div>
      <div class="num h2">noise, generated</div>
      <div class="num h4">shape the silence</div>
    </div>
  </div>
  <div class="meta">Martian Mono · 500 · ls −0.02em → 0 · tabular figures</div>
</body>
</html>
