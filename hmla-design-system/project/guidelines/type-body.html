<!-- @dsCard group="Type" viewport="700x200" name="Body & Data — JetBrains Mono" subtitle="Long-form, values, code · readable mono" -->
<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 24px 28px; background: var(--surface-panel); display: grid; grid-template-columns: 1.3fr 1fr; gap: 26px; }
  p { color: var(--text-body); font-size: 15px; line-height: 1.6; max-width: 42ch; }
  .muted { color: var(--text-muted); }
  .data { font-family: var(--font-mono); display: grid; gap: 7px; }
  .data div { display: flex; justify-content: space-between; gap: 16px; font-size: 14px; }
  .k { color: var(--text-label); text-transform: uppercase; letter-spacing: .08em; font-size: 12px; }
  .v { color: var(--text-hi); font-variant-numeric: tabular-nums; }
  .accent { color: var(--accent); }
</style>
</head>
<body>
  <p>noise, generated — a calmer machine for your room. set the density, route to a bus, and <span class="muted">let it run.</span> we assume you know what a low-pass filter is.</p>
  <div class="data">
    <div><span class="k">master</span><span class="v">−6.0 dB</span></div>
    <div><span class="k">tempo</span><span class="v">120.00 BPM</span></div>
    <div><span class="k">density</span><span class="v">0.85 Hz</span></div>
    <div><span class="k">seed</span><span class="v">0x4F2A</span></div>
    <div><span class="k">format</span><span class="v">48k / 24-bit</span></div>
    <div><span class="k">state</span><span class="v accent">live ●</span></div>
  </div>
</body>
</html>
