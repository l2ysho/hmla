<!-- @dsCard group="Spacing" viewport="700x180" name="Depth — bevels, wells & shadows" subtitle="engraved hardware language" -->
<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 26px 28px; background: var(--surface-panel); }
  .row { display: flex; gap: 20px; align-items: stretch; }
  .col { flex: 1; display: grid; gap: 10px; }
  .box { height: 76px; border-radius: var(--radius-lg); display: flex; align-items: center; justify-content: center; font-family: var(--font-mono); font-size: 12px; color: var(--text-muted); }
  .raised { background: var(--surface-raised); border: 1px solid var(--line-hairline); box-shadow: var(--bevel-raised), var(--shadow-md); }
  .well { background: var(--surface-well); box-shadow: var(--shadow-well); }
  .pop { background: var(--surface-raised); box-shadow: var(--shadow-pop); border: 1px solid var(--line-hairline); }
  .glow { background: var(--surface-control); box-shadow: var(--glow-accent); color: var(--accent); }
  .lbl { font-family: var(--font-mono); font-size: 11px; color: var(--text-faint); text-align: center; }
</style>
</head>
<body>
  <div class="row">
    <div class="col"><div class="box raised">raised module</div><span class="lbl">--bevel-raised + --shadow-md</span></div>
    <div class="col"><div class="box well">recessed well</div><span class="lbl">--shadow-well (inset)</span></div>
    <div class="col"><div class="box pop">floating</div><span class="lbl">--shadow-pop</span></div>
    <div class="col"><div class="box glow">on / live</div><span class="lbl">--glow-accent</span></div>
  </div>
</body>
</html>
