<!-- @dsCard group="Colors" viewport="700x150" name="Accent — signal orange" subtitle="active · hover · press · glow · tint" -->
<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 24px 28px; background: var(--surface-panel); }
  .row { display: flex; gap: 14px; align-items: stretch; }
  .sw { flex: 1; height: 72px; border-radius: var(--radius-md); display: flex; align-items: flex-end; padding: 8px; font-family: var(--font-mono); font-size: 11px; }
  .cap { font-family: var(--font-mono); font-size: 11px; color: var(--text-muted); margin-top: 9px; }
  .cap b { color: var(--text-body); font-weight: 500; display: block; }
</style>
</head>
<body>
  <div class="row">
    <div style="flex:1">
      <div class="sw" style="background:var(--accent);color:var(--text-on-accent)">#ff5c38</div>
      <div class="cap"><b>accent</b>active / live</div>
    </div>
    <div style="flex:1">
      <div class="sw" style="background:var(--accent-hover);color:var(--text-on-accent)">#ff7a5c</div>
      <div class="cap"><b>hover</b>lift</div>
    </div>
    <div style="flex:1">
      <div class="sw" style="background:var(--accent-active);color:var(--text-on-accent)">#e8451f</div>
      <div class="cap"><b>press</b>active</div>
    </div>
    <div style="flex:1">
      <div class="sw" style="background:var(--surface-control);box-shadow:var(--glow-accent);color:var(--accent)">glow</div>
      <div class="cap"><b>glow</b>on-state halo</div>
    </div>
    <div style="flex:1">
      <div class="sw" style="background:var(--accent-tint);color:var(--accent)">tint</div>
      <div class="cap"><b>tint</b>12% wash</div>
    </div>
  </div>
</body>
</html>
