<!-- @dsCard group="Colors" viewport="700x150" name="Text hierarchy" subtitle="hi · body · muted · label · faint" -->
<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 24px 28px; background: var(--surface-panel); display: grid; gap: 9px; }
  .line { display: flex; align-items: baseline; gap: 16px; }
  .swatch { font-family: var(--font-mono); font-size: 16px; min-width: 220px; }
  .tag { font-family: var(--font-mono); font-size: 11px; color: var(--text-faint); }
</style>
</head>
<body>
  <div class="line"><span class="swatch" style="color:var(--text-hi)">high-contrast title</span><span class="tag">--text-hi · #f6f5f1</span></div>
  <div class="line"><span class="swatch" style="color:var(--text-body)">body copy, default reading</span><span class="tag">--text-body · #e8e7e3</span></div>
  <div class="line"><span class="swatch" style="color:var(--text-muted)">muted / secondary</span><span class="tag">--text-muted · #989aa2</span></div>
  <div class="line"><span class="swatch" style="color:var(--text-label);text-transform:uppercase;letter-spacing:.12em;font-size:13px">panel label</span><span class="tag">--text-label · #6b6b75</span></div>
  <div class="line"><span class="swatch" style="color:var(--text-faint)">faint / disabled</span><span class="tag">--text-faint · #4d4d56</span></div>
</body>
</html>
