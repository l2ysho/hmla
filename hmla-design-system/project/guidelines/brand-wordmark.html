<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 0; background: var(--surface-page); }
  .wrap { position: relative; min-height: 200px; display: flex; align-items: center; gap: 22px; padding: 0 36px; }
  .wrap::after { content:""; position:absolute; inset:0; background-image: var(--grain-url); background-size:180px; opacity:var(--grain-opacity); mix-blend-mode:overlay; pointer-events:none; }
  .mark { width: 64px; height: 36px; color: var(--accent); flex: none; }
  .mark svg { width: 100%; height: 100%; display: block; }
  .type { display: grid; gap: 6px; }
  .word { font-family: var(--font-display); font-weight: 600; font-size: 56px; letter-spacing: -0.02em; color: var(--text-hi); line-height: 1; }
  .tag { font-family: var(--font-display); font-size: 12px; letter-spacing: .24em; text-transform: uppercase; color: var(--text-label); }
</style>
</head>
<body>
  <div class="wrap">
    <span class="mark">
      <svg viewBox="0 0 120 64" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M60 32 C60 14, 86 14, 86 32 C86 50, 60 50, 60 32 C60 14, 34 14, 34 32 C34 50, 60 50, 60 32 Z" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
        <circle cx="60" cy="32" r="3.4" fill="currentColor"/>
      </svg>
    </span>
    <div class="type">
      <span class="word">hmla</span>
      <span class="tag">generative · ambient · noise</span>
    </div>
  </div>
</body>
</html>
